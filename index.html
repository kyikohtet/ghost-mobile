<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHOST_MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .haptic-btn { transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .haptic-btn:active { transform: scale(0.95); background: #222; }
    </style>
</head>
<body class="flex flex-col h-screen p-6 overflow-hidden">

    <header class="flex justify-between items-center py-4">
        <h1 class="text-xs font-black tracking-widest uppercase italic">Ghost_Mobile</h1>
        <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
    </header>

    <main class="flex-1 flex flex-col justify-center gap-8">
        <div class="space-y-2">
            <p class="text-[10px] uppercase opacity-40 font-bold tracking-widest">Awaiting Voice Input...</p>
            <div class="h-[1px] w-full bg-white/10"></div>
        </div>

        <div id="draftCard" class="hidden bg-white/5 rounded-3xl p-6 border border-white/10">
            <span class="text-[8px] font-black uppercase tracking-tighter text-cyan-400">Claude 4.6 Draft</span>
            <p id="previewText" class="text-lg font-light leading-snug mt-4 italic"></p>
        </div>
    </main>

    <footer class="pb-8 space-y-4">
        <button onclick="simulateExecution()" class="haptic-btn w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest">Execute All Platforms</button>
        <button class="haptic-btn w-full bg-white/5 py-4 rounded-2xl text-[10px] font-bold uppercase opacity-50">Discard</button>
    </footer>

    <script>
        function simulateExecution() {
            // This would trigger the Outstand.so API we talked about
            navigator.vibrate(200); // Real haptic feedback
            alert("Sent to X & LinkedIn.");
        }
    </script>
</body>
</html>
